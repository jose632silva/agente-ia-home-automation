<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ARIA — Assistente Residencial Inteligente</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* (mesmo CSS que você já tinha, não vou repetir para economizar, mas mantenha o seu) */
    :root {
      --bg: #07071a;
      --pl: #0b0b22;
      --teal: #00e0c8;
      --purple: #9b7ce0;
      --text: #dce8f0;
      --muted: #506070;
      --border: rgba(0, 224, 200, 0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .hdr {
      display: flex;
      align-items: center;
      padding: 8px 18px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      background: rgba(11, 11, 34, 0.97);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
      z-index: 10;
    }
    .hdr-logo { font-family: 'Orbitron', sans-serif; font-size: 16px; letter-spacing: 6px; color: var(--teal); }
    .hdr-sub { font-size: 9px; color: var(--muted); letter-spacing: 2px; margin-top: 1px; }
    .hdr-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--teal);
      margin-left: auto; animation: dotpulse 2s infinite;
    }
